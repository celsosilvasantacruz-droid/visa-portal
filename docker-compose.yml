version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visa_network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visa_network

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && gunicorn visa_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - visa_network

  celery:
    build: ./backend
    command: celery -A visa_project worker --loglevel=info --concurrency=2
    volumes:
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - visa_network

  frontend:
    build: ./frontend
    networks:
      - visa_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - visa_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  visa_network:
    driver: bridge
